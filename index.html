<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Baseball League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { margin: 0; height: 100%; }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background: #f1f2f4;
      }
      * { box-sizing: border-box; }
      @keyframes bt-spin { to { transform: rotate(360deg); } }
      .bt-spin { animation: bt-spin 0.8s linear infinite; }
      @keyframes bt-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
      .bt-pulse { animation: bt-pulse 1.4s ease-in-out infinite; }

      /* Data-table horizontal scroll: smooth on touch, refined scrollbar */
      .bt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }
      .bt-scroll::-webkit-scrollbar { height: 6px; }
      .bt-scroll::-webkit-scrollbar-thumb { background: rgba(140, 140, 140, 0.4); border-radius: 999px; }
      .bt-scroll::-webkit-scrollbar-track { background: transparent; }
      .bt-table { min-width: 600px; }
      .bt-headrow { display: flex; align-items: center; gap: 16px; }

      /* Frozen rank/team columns: tight padding; divider shadow only while scrolling */
      .bt-table .bt-c-rank { padding-left: 11px !important; padding-right: 3px !important; }
      .bt-table .bt-c-team { padding-left: 7px !important; }
      .bt-scrolled .bt-freeze-edge { box-shadow: 2px 0 6px -2px rgba(0, 0, 0, 0.13) !important; }

      /* Flash a stat cell when its value changes on refresh (green up, red down) */
      @keyframes bt-flash-up { 0% { background-color: rgba(22, 163, 74, 0.30); } 100% { background-color: transparent; } }
      @keyframes bt-flash-down { 0% { background-color: rgba(220, 38, 38, 0.30); } 100% { background-color: transparent; } }
      .bt-flash-up { animation: bt-flash-up 1.4s ease-out; }
      .bt-flash-down { animation: bt-flash-down 1.4s ease-out; }

      /* Desktop: lock BOTH tables to the same fixed column geometry so the
         HR/AVG/Wins/ERA columns line up vertically between Standings and Weekly
         Splits. The left block (#+Team+Record in Standings, Week in Weekly) is
         33%, leaving four equal 16.75% stat columns that start at the same x in
         both. On mobile these rules don't apply: tables stay auto + scroll. */
      @media (min-width: 601px) {
        .bt-standings, .bt-weekly { table-layout: fixed; }
        .bt-standings .bt-c-rank { width: 4%; }
        .bt-standings .bt-c-team { width: 20%; }
        /* Record sits right after Team; its wide column is mostly the reading
           gap that pushes the four stat columns over to the right. */
        .bt-standings .bt-c-record { width: 40%; }
        .bt-weekly .bt-c-week { width: 64%; }
        /* Tight stat columns grouped on the right so they're easy to scan, and
           they start at the same x (64%) in both tables. */
        .bt-c-stat { width: 9%; }
      }

      @media (max-width: 600px) {
        .bt-main { padding-left: 14px !important; padding-right: 14px !important; }
        .bt-leaders { grid-template-columns: 1fr !important; }
        .bt-table { min-width: 0; }
        .bt-table th, .bt-table td { padding-left: 11px !important; padding-right: 11px !important; }
        .bt-hide-mobile { display: none !important; }
        .bt-team-name { display: inline-block; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
        /* Stack the header so the full league title shows, controls below */
        .bt-headrow { flex-direction: column; align-items: flex-start; gap: 12px; }
        .bt-title { white-space: normal !important; overflow: visible !important; }
        .bt-headctrls { margin-left: 0 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
