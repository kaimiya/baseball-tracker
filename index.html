<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rake · If Can Can</title>
    <!-- Modern browsers use the crisp SVG; the PNG is a fallback for those that
         don't support SVG favicons; apple-touch-icon covers iOS home screen. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Fonts are self-hosted via @fontsource (imported in main.jsx). -->
    <style>
      html, body, #root { margin: 0; height: 100%; }
      /* No -webkit-font-smoothing override: the Rake reference renders with the
         browser default (subpixel), which gives Sora/Bricolage their intended
         weight/heft. Forcing "antialiased" made the same weights look too thin. */
      body {
        text-rendering: optimizeLegibility;
        background: #FBFAF6;
      }
      * { box-sizing: border-box; }
      @keyframes bt-spin { to { transform: rotate(360deg); } }
      .bt-spin { animation: bt-spin 0.8s linear infinite; }
      @keyframes bt-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
      .bt-pulse { animation: bt-pulse 1.4s ease-in-out infinite; }

      /* Data-table horizontal scroll: smooth on touch, refined scrollbar */
      /* Shared horizontal gutter so the header lockup + headline line up with
         the page content (36px desktop, 16px mobile). */
      .bt-gutter { padding-left: 36px; padding-right: 36px; }
      /* Breakpoint swap: desktop keeps cards, mobile drops them. */
      .bt-mobile-only { display: none; }
      /* Light-sand band that separates sections on the cardless mobile surface. */
      .bt-section-divider { display: none; }
      .bt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }
      .bt-scroll::-webkit-scrollbar { height: 6px; }
      .bt-scroll::-webkit-scrollbar-thumb { background: rgba(140, 140, 140, 0.4); border-radius: 999px; }
      .bt-scroll::-webkit-scrollbar-track { background: transparent; }
      .bt-table { min-width: 600px; }
      .bt-headrow { display: flex; align-items: center; gap: 16px; }

      /* Frozen rank/team columns: tight padding; divider shadow only while scrolling */
      .bt-table .bt-c-rank { padding-left: 11px !important; padding-right: 3px !important; }
      .bt-table .bt-c-team { padding-left: 7px !important; }
      .bt-scrolled .bt-freeze-edge { box-shadow: 2px 0 6px -2px rgba(0, 0, 0, 0.13) !important; }

      /* Flash a stat cell when its value changes on refresh (blue up, red down) */
      @keyframes bt-flash-up { 0% { background-color: rgba(0, 118, 182, 0.18); } 100% { background-color: transparent; } }
      @keyframes bt-flash-down { 0% { background-color: rgba(185, 74, 46, 0.18); } 100% { background-color: transparent; } }
      .bt-flash-up { animation: bt-flash-up 1.4s ease-out; }
      .bt-flash-down { animation: bt-flash-down 1.4s ease-out; }

      /* Rake board: floating off-white surface on warm sand. Awards columns are
         divided by a hairline border-left (--rk-divider set per theme in JS).
         Symmetric side padding on every column (the outer edge inset comes from
         the board's own padding) so all four read as exactly equal width. */
      .bt-award { border-left: 1px solid var(--rk-divider); padding: 0 18px; min-width: 0; animation: bt-fade-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bt-award:first-child { border-left: none; }

      /* Motion: a soft entrance for the content, and a subtle lift on the
         clickable leader teams. Respects reduced-motion. */
      @keyframes bt-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .bt-rise { animation: bt-rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
      /* Staggered entrances: award columns rise in sequence; standings rows fade
         in one after another (opacity-only so the sticky rank/team cells never
         glitch). Per-item delay is set inline in JS. */
      @keyframes bt-fade-up { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
      @keyframes bt-row-in { from { opacity: 0; } to { opacity: 1; } }
      .bt-row-in { animation: bt-row-in 0.45s ease both; }
      @keyframes bt-dot-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
      .bt-dot-pulse { animation: bt-dot-pulse 1.15s ease-in-out infinite; }

      /* Loading screen: the dot-icon flips in on each swap; the line shimmers. */
      @keyframes bt-flip { 0% { transform: rotateY(-90deg); opacity: 0; } 55% { opacity: 1; } 100% { transform: rotateY(0); opacity: 1; } }
      .bt-flip { animation: bt-flip 0.34s cubic-bezier(0.4, 0, 0.2, 1); }
      @keyframes bt-shimmer { to { background-position: -200% 0; } }
      .bt-shimmer { background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; animation: bt-shimmer 1.8s linear infinite; }
      @media (prefers-reduced-motion: reduce) {
        .bt-flip { animation: none; }
        .bt-shimmer { animation: none; }
      }
      .bt-award-team { transition: opacity 0.14s ease, transform 0.16s cubic-bezier(0.16, 1, 0.3, 1); }
      .bt-award-team:hover { opacity: 0.72; transform: translateY(-1px); }
      .bt-award-team:active { transform: translateY(0) scale(0.98); }
      /* Press feedback on the header action buttons + payouts trigger. */
      .bt-iconbtn:active:not(:disabled) { transform: scale(0.9); }
      .bt-payinfo { transition: transform 0.12s ease; }
      .bt-payinfo:active { transform: scale(0.96); }
      .bt-refresh-btn { transition: color 0.14s ease; }
      .bt-refresh-btn:hover:not(:disabled) { color: var(--rk-accent) !important; }
      .bt-payouts-btn { transition: background 0.12s ease; }
      .bt-payouts-btn:hover { background: var(--rk-icon-hover); }
      /* Payouts trigger: only the info glyph tints blue on hover, not the label. */
      .bt-info-ic { transition: color 0.14s ease; }
      .bt-payinfo:hover .bt-info-ic { color: var(--rk-accent); }
      /* Kill all transitions for the frame the light/dark theme swaps (no flash). */
      .bt-no-transition * { transition: none !important; }

      /* Payouts: two columns divided by a hairline; stacks on mobile. */
      .bt-payouts { display: grid; grid-template-columns: 1fr 1fr; }
      .bt-pay-col + .bt-pay-col { border-left: 1px solid var(--rk-divider); }
      @media (max-width: 600px) {
        .bt-payouts { grid-template-columns: 1fr; }
        .bt-pay-col + .bt-pay-col { border-left: none; border-top: 1px solid var(--rk-divider); }
      }
      @media (prefers-reduced-motion: reduce) {
        .bt-rise, .bt-award, .bt-row-in { animation: none; }
        .bt-dot-pulse { animation: none; opacity: 0.85; }
      }

      /* Desktop: lock BOTH tables to the same fixed column geometry so the
         HR/AVG/Wins/ERA columns line up vertically between Standings and Weekly
         Splits. The left block (#+Team+Record in Standings, Week in Weekly) is
         33%, leaving four equal 16.75% stat columns that start at the same x in
         both. On mobile these rules don't apply: tables stay auto + scroll. */
      @media (min-width: 601px) {
        .bt-standings, .bt-weekly { table-layout: fixed; }
        .bt-standings .bt-c-rank { width: 4%; }
        /* Team is the wide, flexible column (Rake: names never truncate on
           desktop); Record is narrow and sits right after it. Together with the
           4% rank they fill 64%, so the four 9% stat columns start at the same x
           as Weekly Splits' stat columns (bt-c-week is 64%). */
        .bt-standings .bt-c-team { width: 40%; }
        .bt-standings .bt-c-record { width: 20%; }
        .bt-weekly .bt-c-week { width: 64%; }
        /* Tight stat columns grouped on the right so they're easy to scan, and
           they start at the same x (64%) in both tables. */
        .bt-c-stat { width: 9%; }
      }

      @media (max-width: 600px) {
        .bt-main { padding-left: 16px !important; padding-right: 16px !important; padding-top: 24px !important; }
        .bt-foot { padding-left: 16px !important; padding-right: 16px !important; }
        .bt-gutter { padding-left: 16px !important; padding-right: 16px !important; }

        /* Cardless single surface: the whole page becomes the panel color, and
           every card goes transparent so content sits on one surface — the only
           sand left is in the hairline dividers. */
        html, body { background: var(--rk-surface) !important; }
        .bt-root { background: var(--rk-surface) !important; }
        .bt-board { background: transparent !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; }
        .bt-awardpad { padding: 2px 0 0 !important; }
        .bt-desktop-only { display: none !important; }
        .bt-mobile-only { display: block !important; }
        .bt-hide-mobile { display: none !important; }

        /* Sections flow on one surface, separated by a full-bleed light-sand
           band; every section aligns to the same 16px gutter as the Awards. */
        .bt-sec { margin-bottom: 0 !important; }
        .bt-section-divider { display: block; height: 7px; background: var(--rk-divider); margin: 24px -16px; }
        .bt-splitshead { padding-left: 0 !important; padding-right: 0 !important; }

        /* Awards as a compact 2×2 grid (dashboard read) instead of a tall stack.
           Symmetric column padding so both columns are equal width, with a
           centered vertical hairline between them; smaller hero figures to suit. */
        .bt-leaders { grid-template-columns: 1fr 1fr !important; column-gap: 0 !important; row-gap: 0 !important; }
        .bt-award { border: none !important; padding: 0 !important; }
        .bt-award:nth-child(odd) { padding-right: 20px !important; }
        .bt-award:nth-child(even) { padding-left: 20px !important; border-left: 1px solid var(--rk-divider) !important; }
        .bt-award:nth-child(1), .bt-award:nth-child(2) { padding-bottom: 22px !important; }
        .bt-award:nth-child(3), .bt-award:nth-child(4) { padding-top: 22px !important; border-top: 1px solid var(--rk-divider) !important; }
        .bt-award-num { font-size: 34px !important; margin: 6px 0 12px !important; }

        /* Standings fits fully on-screen (no h-scroll) and reads at the Weekly
           Splits scale: fixed layout, tight stat columns, smaller name + logo. */
        .bt-table { min-width: 0; }
        .bt-scroll { padding-left: 0 !important; padding-right: 0 !important; }
        .bt-table th, .bt-table td { padding-left: 10px !important; padding-right: 10px !important; }
        .bt-standings { table-layout: fixed; }
        .bt-standings .bt-c-rank { width: 20px; padding-left: 0 !important; }
        .bt-weekly .bt-c-week { padding-left: 0 !important; }
        .bt-standings .bt-c-stat { width: 48px; }
        .bt-standings th, .bt-standings td { padding-left: 6px !important; padding-right: 6px !important; }
        /* Table fits now, so the frozen rank/team columns aren't needed — turn
           off sticky so their opaque background can't overlap the HR column. */
        .bt-standings .bt-c-rank, .bt-standings .bt-c-team { position: static !important; box-shadow: none !important; }
        .bt-standings tbody .bt-c-rank { font-size: 13px !important; }
        .bt-standings .bt-teammark { width: 20px !important; height: 20px !important; }
        .bt-team-name { display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; font-size: 13px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
