<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Baseball League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { margin: 0; height: 100%; }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background: #f1f2f4;
      }
      * { box-sizing: border-box; }
      @keyframes bt-spin { to { transform: rotate(360deg); } }
      .bt-spin { animation: bt-spin 0.8s linear infinite; }

      /* Data-table horizontal scroll: smooth on touch, refined scrollbar */
      .bt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }
      .bt-scroll::-webkit-scrollbar { height: 6px; }
      .bt-scroll::-webkit-scrollbar-thumb { background: rgba(140, 140, 140, 0.4); border-radius: 999px; }
      .bt-scroll::-webkit-scrollbar-track { background: transparent; }
      .bt-table { min-width: 600px; }

      @media (max-width: 600px) {
        .bt-main { padding-left: 14px !important; padding-right: 14px !important; }
        .bt-leaders { grid-template-columns: 1fr !important; }
        .bt-table { min-width: 0; }
        .bt-table th, .bt-table td { padding-left: 11px !important; padding-right: 11px !important; }
        .bt-hide-mobile { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
